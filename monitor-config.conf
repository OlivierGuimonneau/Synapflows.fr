# 📧 SynapFlows Monitoring Configuration
# Location: /etc/synapflows/monitor-config.conf

# ============================================
# EMAIL ALERTS
# ============================================

# Email address to receive alerts
ALERT_EMAIL="olivier@synapflows.fr"

# Alternative emails (comma-separated for multiple recipients)
# ALERT_EMAIL="admin@synapflows.fr,ops@synapflows.fr"

# ============================================
# ALERT THRESHOLDS
# ============================================

# Certificate warning threshold (days before expiry)
# Default: 14 days
CERT_WARNING_DAYS=14

# CSP violation alert threshold (violations per check)
# Default: 20 violations
CSP_VIOLATION_THRESHOLD=20

# Rate limit abuse threshold (hits per check)
# Default: 5 hits
RATELIMIT_ABUSE_THRESHOLD=5

# Response time threshold (seconds)
# Default: 2.0 seconds
RESPONSE_TIME_THRESHOLD=2.0

# ============================================
# NOTIFICATION OPTIONS
# ============================================

# Send email alerts (true/false)
SEND_EMAIL_ALERTS=true

# Log to syslog (true/false) 
SEND_SYSLOG_ALERTS=false

# Slack webhook URL (optional)
# Get webhook from: https://slack.com/apps/A0F81R7U7-incoming-webhooks
# SLACK_WEBHOOK_URL="https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

# PagerDuty integration key (optional)
# PAGERDUTY_KEY="YOUR_PAGERDUTY_KEY"

# ============================================
# LOGGING
# ============================================

# Log directory
LOG_DIR="/var/log/synapflows"

# Keep logs for (days)
KEEP_LOGS_DAYS=90

# ============================================
# MONITORING FREQUENCY
# ============================================

# How often to run checks (via cron)
# Options: 
#   "hourly"      - Every hour (recommended for 24/7 monitoring)
#   "four-times"  - 4 times daily (6 AM, 12 PM, 6 PM, 12 AM)
#   "daily"       - Once daily (default)
#   "custom"      - Specify custom schedule in CUSTOM_CRON

MONITORING_FREQUENCY="daily"

# Custom cron schedule (if MONITORING_FREQUENCY=custom)
# Format: "minute hour day month weekday"
# Examples:
#   "0 9 * * *"        - Every day at 9 AM
#   "0 */4 * * *"      - Every 4 hours
#   "0 9,14,19,0 * * *"- At 9 AM, 2 PM, 7 PM, midnight
CUSTOM_CRON="0 7 * * *"

# ============================================
# ALERT SUPPRESSION (optional)
# ============================================

# Suppress alerts during maintenance window (24h format)
# Example: "02:00-04:00" = 2 AM to 4 AM (no alerts sent)
# Leave empty to disable
MAINTENANCE_WINDOW=""

# Do not alert on weekends (true/false)
ALERT_WEEKENDS=true

# ============================================
# DOCUMENTATION
# ============================================
#
# To use this configuration:
# 1. Save this file to: /etc/synapflows/monitor-config.conf
# 2. Make it readable by cron user: chmod 640 /etc/synapflows/monitor-config.conf
# 3. Script will source this file automatically
#
# Email setup (on Ubuntu/Debian):
#   apt-get install mailutils
#   # Verify: echo "Test" | mail -s "Test Alert" admin@synapflows.fr
#
# Slack setup:
#   1. Create Incoming Webhook: https://slack.com/apps/A0F81R7U7
#   2. Copy webhook URL to this file
#   3. Script will post alerts to Slack channel
#
# Testing:
#   /opt/synapflows/monitor-with-alerts.sh  # Run manually
#   tail -50 /var/log/synapflows/security-monitor.log
#   tail -50 /var/log/synapflows/security-alerts.log
#
