name: Deploy SynapFlows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        # On passe directement le secret dans l'environnement du script ssh
        envs: GITHUB_SHA
        script_stop: true
        script: |
          set -e
          
          # On écrit la variable directement dans le script bash
          VPS_PATH="${{ secrets.VPS_PATH }}"
          
          cd $VPS_PATH || { echo "Dossier non trouvé"; exit 1; }
          
          echo "Nettoyage des fichiers locaux..."
          git fetch origin main
          git clean -fd
          git reset --hard origin/main
          
          echo "Créer le fichier .env avec les secrets..."
          cat > .env << 'ENVEOF'
# Production configuration
PORT=5000
NODE_ENV=production
AIRTABLE_BASE_ID=${{ secrets.AIRTABLE_BASE_ID }}
AIRTABLE_PROJETS_SOUMIS=${{ secrets.AIRTABLE_PROJETS_SOUMIS }}
AIRTABLE_TOKEN=${{ secrets.AIRTABLE_TOKEN }}
VITE_RECAPTCHA_SITE_KEY=${{ secrets.RECAPTCHA_SITE_KEY }}
VITE_RECAPTCHA_ACTION=submit_lead
RECAPTCHA_SITE_KEY=${{ secrets.RECAPTCHA_SITE_KEY }}
RECAPTCHA_ENTERPRISE_API_KEY=${{ secrets.RECAPTCHA_ENTERPRISE_API_KEY }}
RECAPTCHA_ENTERPRISE_PROJECT_ID=synapflows
RECAPTCHA_EXPECTED_ACTION=submit_lead
RECAPTCHA_MIN_SCORE=0.5
ENVEOF
          
          echo ".env créé avec succès"
          
          echo "Pull depuis GitHub..."
          git pull origin main
          
          echo "Build image..."
          docker compose build --no-cache
          
          echo "Restart service..."
          docker compose up -d --force-recreate
          
          echo "Status..."
          docker compose ps
          
          echo "Logs..."
          docker compose logs synapflows --tail 15