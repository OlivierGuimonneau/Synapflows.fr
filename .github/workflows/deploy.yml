name: Deploy SynapFlows

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_PROJETS_SOUMIS: ${{ secrets.AIRTABLE_PROJETS_SOUMIS }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_ENTERPRISE_API_KEY: ${{ secrets.RECAPTCHA_ENTERPRISE_API_KEY }}
        run: |
          # Setup SSH with proper key formatting
          mkdir -p ~/.ssh
          
          # Write SSH key using base64 to preserve exact formatting
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Add VPS to known hosts
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Test SSH connection first
          echo "🔐 Testing SSH connection..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo '✓ SSH connection successful'" || exit 1
          
          # Deploy script
          echo "🚀 Starting deployment..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s ${{ secrets.VPS_PATH }} ${{ secrets.AIRTABLE_BASE_ID }} ${{ secrets.AIRTABLE_PROJETS_SOUMIS }} ${{ secrets.AIRTABLE_TOKEN }} ${{ secrets.RECAPTCHA_SITE_KEY }} ${{ secrets.RECAPTCHA_ENTERPRISE_API_KEY }} << 'DEPLOY_SCRIPT'
          set -e
          
          echo "DEBUG: Arguments received: $1 $2 $3 $4 $5 $6"
          
          cd "$1"
          
          echo "📥 Pulling latest code..."
          git fetch origin main
          git clean -fd
          git reset --hard origin/main
          git pull origin main
          
          echo "🔧 Creating .env file with secrets..."
          cat > .env << 'ENVFILE'
            PORT=5000
            NODE_ENV=production
            AIRTABLE_BASE_ID=$2
            AIRTABLE_PROJETS_SOUMIS=$3
            AIRTABLE_TOKEN=$4
            VITE_RECAPTCHA_SITE_KEY=$5
            VITE_RECAPTCHA_ACTION=submit_lead
            RECAPTCHA_SITE_KEY=$5
            RECAPTCHA_ENTERPRISE_API_KEY=$6
            RECAPTCHA_ENTERPRISE_PROJECT_ID=synapflows
            RECAPTCHA_EXPECTED_ACTION=submit_lead
            RECAPTCHA_MIN_SCORE=0.5
            ENVFILE
          
          echo "DEBUG: .env created, first 3 lines:"
          head -3 .env
          
          echo "🏗️  Building Docker image..."
          docker compose build --no-cache
          
          echo "⏹️  Stopping old container..."
          docker compose down || true
          
          echo "▶️  Starting new container..."
          docker compose up -d
          
          echo "✅ Waiting for service to be ready..."
          sleep 5
          
          echo "🔍 Checking container status..."
          docker compose ps
          
          echo "📋 Recent logs..."
          docker compose logs synapflows-www --tail 15
          DEPLOY_SCRIPT


      - name: Deployment Status
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Check https://www.synapflows.fr"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check GitHub Actions logs for details"