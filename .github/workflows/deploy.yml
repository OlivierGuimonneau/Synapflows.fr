name: Deploy SynapFlows

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_PROJETS_SOUMIS: ${{ secrets.AIRTABLE_PROJETS_SOUMIS }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_ENTERPRISE_API_KEY: ${{ secrets.RECAPTCHA_ENTERPRISE_API_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "Testing SSH connection..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST "whoami && pwd"
          
          echo "Deploying..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST '/bin/bash -s' << 'BASHSCRIPT'
          set -e
          cd $VPS_PATH
          git fetch origin main
          git clean -fd
          git reset --hard origin/main
          git pull origin main
          cat > .env << 'ENVEOF'
          PORT=5000
          NODE_ENV=production
          AIRTABLE_BASE_ID=$AIRTABLE_BASE_ID
          AIRTABLE_PROJETS_SOUMIS=$AIRTABLE_PROJETS_SOUMIS
          AIRTABLE_TOKEN=$AIRTABLE_TOKEN
          VITE_RECAPTCHA_SITE_KEY=$RECAPTCHA_SITE_KEY
          VITE_RECAPTCHA_ACTION=submit_lead
          RECAPTCHA_SITE_KEY=$RECAPTCHA_SITE_KEY
          RECAPTCHA_ENTERPRISE_API_KEY=$RECAPTCHA_ENTERPRISE_API_KEY
          RECAPTCHA_ENTERPRISE_PROJECT_ID=synapflows
          RECAPTCHA_EXPECTED_ACTION=submit_lead
          RECAPTCHA_MIN_SCORE=0.5
          ENVEOF
          docker compose build --no-cache
          docker compose up -d --force-recreate
          docker compose ps
          docker compose logs synapflows-www --tail 10
          BASHSCRIPT
          echo "Deployment complete!"

      - name: Deployment Status
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Check https://www.synapflows.fr"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check GitHub Actions logs for details"