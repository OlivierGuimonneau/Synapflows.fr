name: Deploy SynapFlows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: VPS_PATH,AIRTABLE_BASE_ID,AIRTABLE_PROJETS_SOUMIS,AIRTABLE_TOKEN,RECAPTCHA_SITE_KEY,RECAPTCHA_ENTERPRISE_API_KEY
          script_stop: true
          script: |
            set -e
            
            cd "$VPS_PATH" || { echo "Dossier non trouvé"; exit 1; }
            
            echo "Nettoyage des fichiers locaux..."
            git fetch origin main
            git clean -fd
            git reset --hard origin/main
            
            echo "Pull depuis GitHub..."
            git pull origin main
            
            echo "Création du fichier .env..."
            cat > .env << EOF
PORT=5000
NODE_ENV=production
AIRTABLE_BASE_ID=$AIRTABLE_BASE_ID
AIRTABLE_PROJETS_SOUMIS=$AIRTABLE_PROJETS_SOUMIS
AIRTABLE_TOKEN=$AIRTABLE_TOKEN
VITE_RECAPTCHA_SITE_KEY=$RECAPTCHA_SITE_KEY
VITE_RECAPTCHA_ACTION=submit_lead
RECAPTCHA_SITE_KEY=$RECAPTCHA_SITE_KEY
RECAPTCHA_ENTERPRISE_API_KEY=$RECAPTCHA_ENTERPRISE_API_KEY
RECAPTCHA_ENTERPRISE_PROJECT_ID=synapflows
RECAPTCHA_EXPECTED_ACTION=submit_lead
RECAPTCHA_MIN_SCORE=0.5
EOF
            
            echo "Build Docker image..."
            docker compose build --no-cache
            
            echo "Redémarrage du service..."
            docker compose up -d --force-recreate
            
            echo "Statut des conteneurs..."
            docker compose ps
            
            echo "Logs récents..."
            docker compose logs synapflows-www --tail 10